<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bootstrap demo</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

<script>
let data = {
  "friends": [
    {"firstName": "George", "lastName": "Kristoferson", "phone": "2062062066"},
    {"firstName": "Bill", "lastName": "Madison", "phone": "4254254255"},
    {"firstName": "Peter", "lastName": "Frampton", "phone": "2125554545"},
    {"firstName": "Anna", "lastName": "Calixtus", "phone": "7259865321"},
    {"firstName": "Marie", "lastName": "Curie", "phone": "6017744991"}
  ]
};
</script>
</head>

<body>

<h1>I'm gonna try some Data Loading</h1>

<div class="container mb-6">
<p>This is a simple example of using data loading.</p>
<button onclick="FillTheTable()" class="btn btn-primary">Fill the table</button>
<button onclick="ClearTheTable()" class="btn btn-secondary">Clear the table</button>

<table class="table" id="friendsTable">
<thead>
<tr>
<th scope="col">First Name</th>
<th scope="col">Last Name</th>
<th scope="col">Phone</th>
</tr>
</thead>
<tbody>
</tbody>
</table>
</div>

<hr>

<div class="container mb-6">
<p>This is a simple example of using fetch to get data from an API.</p>
<button onclick="getData()" class="btn btn-primary">Get Data</button>
<div id="apiData"></div>
</div>

<hr>

<div class="container mb-6">
<p>This is a simple example of using fetch to get data from an API.</p>

<select id="userSelect" class="form-select mb-3" aria-label="Select Friend">
<option selected>Select a user</option>
</select>

<button onclick="GetSelectData()" class="btn btn-primary">Get Friend's Data</button>
<div id="apiSelect"></div>
</div>

<script>

function GetSelectData() {
const select = document.getElementById("userSelect");
const phone = select.value;

const friend = data.friends.find(f => f.phone === phone);

if (friend) {
document.getElementById("apiSelect").innerHTML =
`<p>You selected: ${friend.firstName} ${friend.lastName}, Phone: ${friend.phone}</p>`;
} else {
document.getElementById("apiSelect").innerHTML =
`<p>No friend found with that phone number.</p>`;
}
}
function PopulateSelect(){
const select = document.getElementById("userSelect");
data.friends.forEach(friend => {
const option = document.createElement("option");
option.value = friend.phone;
option.textContent = `${friend.firstName} ${friend.lastName}`;
select.appendChild(option);
});
}

function ClearTheTable(){
const table = document.getElementById("friendsTable");
while(table.rows.length > 1){
table.deleteRow(1);
}
}
function FillTheTable(){
wconst table = document.getElementById("friendsTable").getElementsByTagName("tbody")[0];
data.friends.forEach(friend => {
const row = table.insertRow();
const cell1 = row.insertCell(0);
const cell2 = row.insertCell(1);
const cell3 = row.insertCell(2);

cell1.textContent = friend.firstName;
cell2.textContent = friend.lastName;
cell3.textContent = friend.phone;
});
}
async function getData() {
const response = await fetch("https://jsonplaceholder.typicode.com/posts/1");
const data = await response.json();
console.log(data);
document.getElementById("apiData").innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
}

PopulateSelect();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
