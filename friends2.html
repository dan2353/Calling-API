<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Friends 2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-4">
    <h1>Friends List</h1>
<table class="table table-bordered">
      <thead>
        <tr>
          <th>ID</th>
          <th>Full Name</th>
        </tr>
      </thead>
      <tbody id="friendsBody"></tbody>
    </table>

    <div id="output"></div>
  </div>

  <script>
    let data = {
      "friends": [
        {"id": 1, "firstName": "George", "lastName": "Kristoferson", "phone": "2062062066"},
        {"id": 2, "firstName": "Bill", "lastName": "Madison", "phone": "4254254255"},
        {"id": 3, "firstName": "Peter", "lastName": "Frampton", "phone": "2125554545"},
        {"id": 4, "firstName": "Anna", "lastName": "Calixtus", "phone": "7259865321"},
        {"id": 5, "firstName": "Marie", "lastName": "Curie", "phone": "6017744991"}
      ]
    };

   function FillFriendsTable() {
      const body = document.getElementById("friendsBody");

      data.friends.forEach(friend => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${friend.id}</td>
          <td><a href="#" onclick="ShowFriend(${friend.id}); return false;">${friend.firstName} ${friend.lastName}</a></td>
        `;

        body.appendChild(row);
      });
    }
function ShowFriend(id) {
      const friend = data.friends.find(f => f.id === id);

      document.getElementById("output").innerHTML =
        `<p>${friend.firstName} ${friend.lastName} - Phone: ${friend.phone} - Link: https://api.com/friends/${friend.id}</p>`;
    }
 FillFriendsTable();
  </script>
</body>
</html>
